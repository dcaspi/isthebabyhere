<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is The Baby Here?</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👶🏻</text></svg>">
    <meta name="description" content="The official source of truth on whether Ella & Dan's baby has arrived.">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="She's here!">
    <meta property="og:description" content="Aviv has arrived.">
    <meta property="og:type" content="website">
    <link rel="alternate" type="application/rss+xml" title="Is The Baby Here?" href="/rss.xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #FAF7F2;
            --warm-black: #2A2520;
            --terracotta: #C4704B;
            --sage: #8B9E7E;
            --soft-pink: #E8D5CF;
            --green: #4E7C5F;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--warm-black);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        .bg-shape {
            position: fixed;
            border-radius: 50%;
            opacity: 0.08;
            z-index: 0;
        }
        .bg-shape--1 {
            width: 400px;
            height: 400px;
            background: var(--terracotta);
            top: -120px;
            right: -80px;
            animation: float-slow 20s ease-in-out infinite;
        }
        .bg-shape--2 {
            width: 300px;
            height: 300px;
            background: var(--sage);
            bottom: -100px;
            left: -60px;
            animation: float-slow 25s ease-in-out infinite reverse;
        }
        .bg-shape--3 {
            width: 200px;
            height: 200px;
            background: var(--soft-pink);
            top: 40%;
            left: 10%;
            animation: float-slow 18s ease-in-out infinite 3s;
        }

        @keyframes float-slow {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -30px) scale(1.05); }
            66% { transform: translate(-15px, 15px) scale(0.95); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 730px;
            margin-top: 8vh;
        }

        .question {
            font-family: 'Fraunces', serif;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 300;
            color: var(--terracotta);
            letter-spacing: 0.01em;
            margin-bottom: 0.5rem;
            animation: fade-down 0.8s ease-out both;
        }

        .answer {
            font-family: 'Fraunces', serif;
            font-size: clamp(5rem, 18vw, 11rem);
            font-weight: 700;
            line-height: 0.95;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
            color: var(--green);
            animation: scale-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
        }

        .baby-name {
            font-family: 'Fraunces', serif;
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            font-weight: 400;
            color: var(--warm-black);
            margin-bottom: 0.4rem;
            animation: fade-up 0.8s ease-out 0.5s both;
            line-height: 1.3;
        }

        /* Annotated names with dictionary tooltips */
        .name-annotated {
            position: relative;
            display: inline-block;
            border-bottom: 2px dotted var(--terracotta);
            cursor: help;
        }

        .name-annotated .tooltip {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            background: var(--cream);
            color: var(--warm-black);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 10;
            box-shadow: 0 4px 24px rgba(42, 37, 32, 0.15), 0 1px 4px rgba(42, 37, 32, 0.08);
            border: 1px solid rgba(42, 37, 32, 0.08);
            text-align: left;
            line-height: 1.5;
        }

        .name-annotated .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: var(--cream);
        }

        .name-annotated:hover .tooltip,
        .name-annotated:focus .tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .tooltip .dict-word {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 1rem;
            display: block;
            margin-bottom: 1px;
        }

        .tooltip .dict-pronunciation {
            color: var(--terracotta);
            font-style: italic;
            font-size: 0.78rem;
        }

        .tooltip .dict-type {
            font-style: italic;
            opacity: 0.5;
            font-size: 0.75rem;
        }

        .tooltip .dict-divider {
            display: block;
            width: 100%;
            height: 1px;
            background: rgba(42, 37, 32, 0.1);
            margin: 5px 0;
        }

        .tooltip .dict-def {
            display: block;
            font-size: 0.8rem;
        }

        .tooltip .dict-origin {
            display: block;
            font-size: 0.72rem;
            opacity: 0.45;
            margin-top: 3px;
        }

        .born-info {
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            color: var(--warm-black);
            opacity: 0.45;
            margin-bottom: 2rem;
            animation: fade-up 0.8s ease-out 0.6s both;
        }

        .subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: var(--warm-black);
            opacity: 0.5;
            font-style: italic;
            line-height: 1.6;
            animation: fade-up 0.8s ease-out 0.7s both;
            margin-bottom: 2.5rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            max-width: 730px;
            width: 100%;
            padding: 0 2rem;
            margin-bottom: 2rem;
            z-index: 1;
            position: relative;
        }

        .gallery-item {
            border-radius: 12px;
            overflow: hidden;
            box-shadow:
                0 4px 20px rgba(42, 37, 32, 0.08),
                0 1px 3px rgba(42, 37, 32, 0.06);
            border: 3px solid white;
            aspect-ratio: 4/5;
            animation: fade-up 0.8s ease-out both;
        }

        .gallery-item:nth-child(1) { animation-delay: 0.8s; }
        .gallery-item:nth-child(2) { animation-delay: 0.9s; }
        .gallery-item:nth-child(3) { animation-delay: 1.0s; }
        .gallery-item:nth-child(4) { animation-delay: 1.1s; }
        .gallery-item:nth-child(5) { animation-delay: 1.2s; }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        @media (min-width: 500px) {
            .gallery {
                grid-template-columns: 1fr 1fr;
            }
            .gallery-item:last-child:nth-child(odd) {
                grid-column: 1 / -1;
                max-width: 50%;
                justify-self: center;
            }
        }

        .footer {
            margin-top: 1rem;
            margin-bottom: 2rem;
            font-size: 0.75rem;
            color: var(--warm-black);
            opacity: 0.3;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: fade-up 0.8s ease-out 1.3s both;
            z-index: 1;
        }

        .rss-link {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--terracotta);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .rss-link:hover {
            opacity: 0.6;
        }

        .rss-link svg {
            width: 12px;
            height: 12px;
        }

        @keyframes fade-down {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scale-in {
            from { opacity: 0; transform: scale(0.7); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-shape bg-shape--1"></div>
    <div class="bg-shape bg-shape--2"></div>
    <div class="bg-shape bg-shape--3"></div>

    <main class="container">
        <p class="question">Is Ella & Dan's baby here yet?</p>
        <h1 class="answer">Yes!</h1>

        <p class="baby-name">
            Introducing
            <span class="name-annotated" tabindex="0">
                Aviv
                <span class="tooltip">
                    <span class="dict-word">Aviv</span>
                    <span class="dict-pronunciation">/a·ˈviv/</span> <span class="dict-type">noun</span>
                    <span class="dict-divider"></span>
                    <span class="dict-def">Spring (in Hebrew).</span>
                    <span class="dict-origin">Hebrew · אביב</span>
                </span>
            </span>
            <span class="name-annotated" tabindex="0">
                Phoebe
                <span class="tooltip">
                    <span class="dict-word">Phoebe</span>
                    <span class="dict-pronunciation">/ˈfiː.bi/</span> <span class="dict-type">proper noun</span>
                    <span class="dict-divider"></span>
                    <span class="dict-def">Ella's very cool great-great-grandmother.</span>
                    <span class="dict-origin">Greek · Φοίβη · "bright, radiant"</span>
                </span>
            </span>
        </p>

        <p class="born-info">Born 27 February 2026 at 8:20 PM</p>
    </main>

    <div class="gallery">
        <div class="gallery-item">
            <img src="photos/baby-closeup.png" alt="Aviv sleeping">
        </div>
        <div class="gallery-item">
            <img src="photos/dad-and-baby.png" alt="Dad holding Aviv">
        </div>
        <div class="gallery-item">
            <img src="photos/mum-brother-baby.png" alt="Mum and big brother meeting Aviv">
        </div>
        <div class="gallery-item">
            <img src="photos/family-outside.png" alt="The whole family heading home">
        </div>
        <div class="gallery-item">
            <img src="photos/big-brother.png" alt="Big brother holding Aviv">
        </div>
    </div>

    <footer class="footer">
        Born Feb 27, 2026; 8:20 PM.
        <span>·</span>
        <a href="/rss.xml" class="rss-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><circle cx="6.18" cy="17.82" r="2.18"/><path d="M4 4.44v2.83c7.03 0 12.73 5.7 12.73 12.73h2.83c0-8.59-6.97-15.56-15.56-15.56zm0 5.66v2.83c3.9 0 7.07 3.17 7.07 7.07h2.83c0-5.47-4.43-9.9-9.9-9.9z"/></svg>
            RSS
        </a>
    </footer>
</body>
</html>
